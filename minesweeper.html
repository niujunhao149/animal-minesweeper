<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦁 动物扫雷</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💣</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-container {
            background: #c0c0c0;
            border: 4px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #c0c0c0;
            border: 3px inset #808080;
            padding: 8px 12px;
            margin-bottom: 10px;
        }

        .counter {
            background: #000;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            font-size: 28px;
            font-weight: bold;
            padding: 4px 8px;
            min-width: 60px;
            text-align: center;
            border: 2px inset #808080;
        }

        .reset-btn {
            font-size: 32px;
            background: #c0c0c0;
            border: 3px outset #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            cursor: pointer;
            padding: 4px 8px;
            user-select: none;
        }

        .reset-btn:active {
            border: 3px inset #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        .board {
            display: grid;
            gap: 0;
            border: 3px inset #808080;
        }

        .cell {
            width: 35px;
            height: 35px;
            background: #c0c0c0;
            border: 3px outset #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
        }

        .cell:active:not(.revealed):not(.flagged) {
            border: 1px solid #808080;
        }

        .cell.revealed {
            border: 1px solid #808080;
            background: #d0d0d0;
            cursor: default;
        }

        .cell.flagged {
            cursor: pointer;
        }

        .cell.mine-exploded {
            background: #ff0000;
        }

        .cell .num-1 { color: #0000ff; }
        .cell .num-2 { color: #008000; }
        .cell .num-3 { color: #ff0000; }
        .cell .num-4 { color: #000080; }
        .cell .num-5 { color: #800000; }
        .cell .num-6 { color: #008080; }
        .cell .num-7 { color: #000000; }
        .cell .num-8 { color: #808080; }

        .instructions {
            margin-top: 20px;
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .instructions p {
            margin: 5px 0;
        }

        .difficulty {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .difficulty button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border: 2px outset #fff;
            background: #c0c0c0;
            border-right-color: #808080;
            border-bottom-color: #808080;
        }

        .difficulty button:active,
        .difficulty button.active {
            border: 2px inset #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over-modal {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        .game-over-modal h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .game-over-modal button {
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        .game-over-modal button:hover {
            background: #764ba2;
        }

        /* 设置面板样式 */
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 28px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .settings-btn:hover {
            transform: rotate(90deg);
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .settings-panel {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        .settings-panel h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #333;
        }

        .emoji-setting {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .emoji-setting label {
            flex: 1;
            font-weight: bold;
            color: #333;
        }

        .emoji-preview {
            font-size: 32px;
            margin: 0 15px;
            min-width: 50px;
            text-align: center;
        }

        .emoji-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .emoji-input input[type="text"] {
            width: 60px;
            font-size: 24px;
            text-align: center;
            padding: 5px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        .emoji-input input[type="file"] {
            display: none;
        }

        .upload-btn {
            padding: 8px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .upload-btn:hover {
            background: #764ba2;
        }

        .clear-btn {
            padding: 8px 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .clear-btn:hover {
            background: #ee5a5a;
        }

        .settings-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
        }

        .settings-actions button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .save-settings {
            background: #667eea;
            color: white;
        }

        .save-settings:hover {
            background: #764ba2;
        }

        .reset-settings {
            background: #ddd;
            color: #333;
        }

        .reset-settings:hover {
            background: #ccc;
        }

        .close-settings {
            background: #ff6b6b;
            color: white;
        }

        .close-settings:hover {
            background: #ee5a5a;
        }

        .preset-emojis {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .preset-emoji {
            font-size: 24px;
            padding: 5px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 5px;
            transition: all 0.2s;
        }

        .preset-emoji:hover {
            border-color: #667eea;
            transform: scale(1.2);
        }

        .image-preview {
            max-width: 50px;
            max-height: 50px;
            margin-left: 10px;
            border-radius: 5px;
        }

        /* 3D 模式样式 */
        .layer-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            padding: 10px;
            background: #c0c0c0;
            border: 3px inset #808080;
        }

        .layer-controls button {
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            border: 2px outset #fff;
            background: #c0c0c0;
            border-right-color: #808080;
            border-bottom-color: #808080;
        }

        .layer-controls button:active {
            border: 2px inset #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        .layer-info {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            min-width: 100px;
            text-align: center;
        }

        .cell-3d {
            position: relative;
        }

        .cell-3d::after {
            content: attr(data-layer);
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>🦁 动物扫雷 🐾</h1>
    
    <div class="difficulty">
        <button onclick="setGameMode('2d')" id="btn-2d" class="active">2D 模式</button>

                    <span class="preset-emoji" onclick="setEmoji('mine', '⚡')">⚡</span>
                    <span class="preset-emoji" onclick="setEmoji('mine', '💀')">💀</span>

                </div>
            </div>

                <label>🚩 旗帜：</label>
                <div class="emoji-preview" id="flag-preview">🐶</div>
                <div class="emoji-input">
                    <input type="text" id="flag-input" placeholder="🐶" maxlength="2">
                    <button class="upload-btn" onclick="document.getElementById('flag-file').click()">上传图片</button>
                    <input type="file" id="flag-file" accept="image/*" onchange="uploadImage('flag', this)">
                    <button class="clear-btn" onclick="clearImage('flag')">清除</button>
                </div>
                <div class="preset-emojis">
                    <span class="preset-emoji" onclick="setEmoji('flag', '🐶')">🐶</span>
                    <span class="preset-emoji" onclick="setEmoji('flag', '🚩')">🚩</span>
                    <span class="preset-emoji" onclick="setEmoji('flag', '🏴')">🏴</span>
                    <span class="preset-emoji" onclick="setEmoji('flag', '🎯')">🎯</span>
                    <span class="preset-emoji" onclick="setEmoji('flag', '⭐')">⭐</span>

                    <input type="file" id="happy-file" accept="image/*" onchange="uploadImage('happy', this)">

                    <span class="preset-emoji" onclick="setEmoji('happy', '😊')">😊</span>

    <div class="game-over-overlay" id="game-over-overlay" style="display: none;">
        <div class="game-over-modal">
            <h2 id="game-over-title">游戏结束</h2>
            <p id="game-over-message"></p>
            <button onclick="resetGame(); document.getElementById('game-over-overlay').style.display='none';">再来一局 🎮</button>
        </div>

    <script>
        const ANIMALS = {
            mine: '🦁',
            flag: '🐶',
            happy: '😺',
            scared: '🙀',
            dead: '😿',
            cool: '😎',
            numbers: ['', '1️⃣', '2️⃣', '3️⃣', '4️⃣', '5️⃣', '6️⃣', '7️⃣', '8️⃣']
        };

        let board = [];
        let revealed = [];
        let flagged = [];
        let rows = 9;
        let cols = 9;
        let mineCount = 10;
        let gameOver = false;
        let gameWon = false;
        let firstClick = true;
        let timer = 0;
        let timerInterval = null;

        function setDifficulty(level) {
            document.querySelectorAll('.difficulty button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${level}`).classList.add('active');
            
            switch(level) {
                case 'easy':
                    rows = 9; cols = 9; mineCount = 10;
                    break;
                case 'medium':
                    rows = 16; cols = 16; mineCount = 40;
                    break;
                case 'hard':
                    rows = 16; cols = 30; mineCount = 99;
                    break;
            }
            resetGame();
        }

        function initBoard() {
            board = Array(rows).fill().map(() => Array(cols).fill(0));
            revealed = Array(rows).fill().map(() => Array(cols).fill(false));
            flagged = Array(rows).fill().map(() => Array(cols).fill(false));
        }

        function placeMines(excludeRow, excludeCol) {
            let placed = 0;
            while (placed < mineCount) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * cols);
                
                // 不在第一次点击的位置及周围放置地雷
                if (Math.abs(r - excludeRow) <= 1 && Math.abs(c - excludeCol) <= 1) continue;
                if (board[r][c] === -1) continue;
                
                board[r][c] = -1;
                placed++;
            }
            
            // 计算数字
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c] === -1) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            const nr = r + dr;
                            const nc = c + dc;
                            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) {
                                count++;
                            }
                        }
                    }
                    board[r][c] = count;
                }
            }
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.style.gridTemplateColumns = `repeat(${cols}, 35px)`;
            boardEl.innerHTML = '';

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    cell.addEventListener('click', () => handleClick(r, c));
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleRightClick(r, c);
                    });
                    
                    boardEl.appendChild(cell);
                }
            }
            updateDisplay();
        }

        function handleClick(r, c) {
            if (gameOver || gameWon || flagged[r][c] || revealed[r][c]) return;

            if (firstClick) {
                firstClick = false;
                placeMines(r, c);
                startTimer();
            }

            if (board[r][c] === -1) {
                // 踩到地雷
                gameOver = true;
                revealed[r][c] = true; // 标记触雷位置为已揭开
                revealAllMines();
                document.getElementById('reset-btn').textContent = ANIMALS.dead;
                stopTimer();
                updateDisplay(); // 更新界面显示所有地雷
                showGameOver(false);
                return;
            }

            reveal(r, c);
            checkWin();
            updateDisplay();
        }

        function handleRightClick(r, c) {
            if (gameOver || gameWon || revealed[r][c]) return;
            
            flagged[r][c] = !flagged[r][c];
            updateMineCounter();
            updateDisplay();
            checkWin();
        }

        function reveal(r, c) {
            if (r < 0 || r >= rows || c < 0 || c >= cols) return;
            if (revealed[r][c] || flagged[r][c]) return;
            
            revealed[r][c] = true;
            
            if (board[r][c] === 0) {
                // 揭开周围
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        reveal(r + dr, c + dc);
                    }
                }
            }
        }

        function revealAllMines() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c] === -1) {
                        revealed[r][c] = true;
                    }
                }
            }
        }

        function checkWin() {
            let unrevealedSafe = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!revealed[r][c] && board[r][c] !== -1) {
                        unrevealedSafe++;
                    }
                }
            }
            
            if (unrevealedSafe === 0) {
                gameWon = true;
                gameOver = true;
                document.getElementById('reset-btn').textContent = ANIMALS.cool;
                stopTimer();
                showGameOver(true);
            }
        }

        function updateDisplay() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                
                cell.className = 'cell';
                cell.innerHTML = '';
                
                if (revealed[r][c]) {
                    cell.classList.add('revealed');
                    if (board[r][c] === -1) {
                        cell.textContent = ANIMALS.mine;
                        if (gameOver && !gameWon) {
                            cell.classList.add('mine-exploded');
                        }
                    } else if (board[r][c] > 0) {
                        const span = document.createElement('span');
                        span.className = `num-${board[r][c]}`;
                        span.textContent = board[r][c];
                        cell.appendChild(span);
                    }
                } else if (flagged[r][c]) {
                    cell.classList.add('flagged');
                    cell.textContent = ANIMALS.flag;
                }
            });
        }

        function updateMineCounter() {
            const flagCount = flagged.flat().filter(f => f).length;
            const remaining = mineCount - flagCount;
            document.getElementById('mine-counter').textContent = String(Math.max(0, remaining)).padStart(3, '0');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('timer').textContent = String(Math.min(999, timer)).padStart(3, '0');
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function showGameOver(won) {
            // 延迟 2 秒显示弹窗，让玩家有时间看一眼战局
            setTimeout(() => {
                const overlay = document.getElementById('game-over-overlay');
                const title = document.getElementById('game-over-title');
                const message = document.getElementById('game-over-message');
                
                if (won) {
                    title.textContent = '🎉 恭喜获胜！';
                    message.textContent = `你用了 ${timer} 秒找出了所有地雷！`;
                } else {
                    title.textContent = '💥 游戏结束';
                    message.textContent = '很遗憾，你踩到地雷了！';
                }
                
                overlay.style.display = 'flex';
            }, 2000);
        }

        function resetGame() {
            stopTimer();
            timer = 0;
            document.getElementById('timer').textContent = '000';
            gameOver = false;
            gameWon = false;
            firstClick = true;
            document.getElementById('reset-btn').textContent = ANIMALS.happy;
            document.getElementById('game-over-overlay').style.display = 'none';
            
            initBoard();
            updateMineCounter();
            renderBoard();
        }

        // 初始化游戏
        resetGame();

        // 设置相关功能
        let customEmojis = {
            mine: '🦁',
            flag: '🐶',
            happy: '😺',
            scared: '🙀',
            dead: '😿',
            cool: '😎'
        };

        let customImages = {
            mine: null,
            flag: null,
            happy: null,
            scared: null,
            dead: null,
            cool: null
        };

        // 从 localStorage 加载设置
        function loadSettings() {
            const savedEmojis = localStorage.getItem('minesweeper-emojis');
            const savedImages = localStorage.getItem('minesweeper-images');
            
            if (savedEmojis) {
                customEmojis = JSON.parse(savedEmojis);
            }
            
            if (savedImages) {
                customImages = JSON.parse(savedImages);
            }
            
            updateAllPreviews();
            applySettings();
        }

        // 应用设置到游戏
        function applySettings() {
            ANIMALS.mine = customImages.mine || customEmojis.mine;
            ANIMALS.flag = customImages.flag || customEmojis.flag;
            ANIMALS.happy = customImages.happy || customEmojis.happy;
            ANIMALS.scared = customImages.scared || customEmojis.scared;
            ANIMALS.dead = customImages.dead || customEmojis.dead;
            ANIMALS.cool = customImages.cool || customEmojis.cool;
            
            // 更新重置按钮
            if (!gameOver && !gameWon) {
                document.getElementById('reset-btn').innerHTML = ANIMALS.happy;
            }
            
            updateDisplay();
        }

        // 更新所有预览
        function updateAllPreviews() {
            const types = ['mine', 'flag', 'happy', 'scared', 'dead', 'cool'];
            types.forEach(type => {
                const preview = document.getElementById(`${type}-preview`);
                const input = document.getElementById(`${type}-input`);
                
                if (customImages[type]) {
                    preview.innerHTML = `<img src="${customImages[type]}" class="image-preview">`;
                } else {
                    preview.textContent = customEmojis[type];
                }
                
                if (input) {
                    input.value = customEmojis[type];
                }
            });
        }

        // 打开设置面板
        function openSettings() {
            document.getElementById('settings-overlay').style.display = 'flex';
            updateAllPreviews();
        }

        // 关闭设置面板
        function closeSettings() {
            document.getElementById('settings-overlay').style.display = 'none';
        }

        // 设置 emoji
        function setEmoji(type, emoji) {
            customEmojis[type] = emoji;
            customImages[type] = null; // 清除自定义图片
            
            const preview = document.getElementById(`${type}-preview`);
            const input = document.getElementById(`${type}-input`);
            
            preview.textContent = emoji;
            input.value = emoji;
            
            applySettings();
        }

        // 上传图片
        function uploadImage(type, input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                // 将图片转换为 base64 并缩小尺寸
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 设置为 32x32 像素
                    canvas.width = 32;
                    canvas.height = 32;
                    
                    // 绘制图片
                    ctx.drawImage(img, 0, 0, 32, 32);
                    
                    // 转换为 base64
                    const dataUrl = canvas.toDataURL('image/png');
                    
                    customImages[type] = dataUrl;
                    
                    const preview = document.getElementById(`${type}-preview`);
                    preview.innerHTML = `<img src="${dataUrl}" class="image-preview">`;
                    
                    applySettings();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 清除图片
        function clearImage(type) {
            customImages[type] = null;
            const preview = document.getElementById(`${type}-preview`);
            preview.textContent = customEmojis[type];
            applySettings();
        }

        // 保存设置
        function saveSettings() {
            localStorage.setItem('minesweeper-emojis', JSON.stringify(customEmojis));
            localStorage.setItem('minesweeper-images', JSON.stringify(customImages));
            alert('✅ 设置已保存！');
        }

        // 恢复默认设置
        function resetToDefault() {
            customEmojis = {
                mine: '🦁',
                flag: '🐶',
                happy: '😺',
                scared: '🙀',
                dead: '😿',
                cool: '😎'
            };
            
            customImages = {
                mine: null,
                flag: null,
                happy: null,
                scared: null,
                dead: null,
                cool: null
            };
            
            updateAllPreviews();
            applySettings();
            alert('🔄 已恢复默认设置！');
        }

        // 页面加载时读取设置
        loadSettings();

        // ==================== 3D 扫雷功能 ====================
        let gameMode = '2d'; // '2d' 或 '3d'
        let layers = 5; // 3D 模式的层数
        let currentLayer = 0; // 当前显示的层
        let board3D = [];
        let revealed3D = [];
        let flagged3D = [];

        function setGameMode(mode) {
            gameMode = mode;
            
            // 更新按钮状态
            document.getElementById('btn-2d').classList.remove('active');
            document.getElementById('btn-3d').classList.remove('active');
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            // 显示/隐藏难度选项
            document.getElementById('difficulty-2d').style.display = mode === '2d' ? 'flex' : 'none';
            document.getElementById('difficulty-3d').style.display = mode === '3d' ? 'flex' : 'none';
            
            // 重置游戏
            if (mode === '3d') {
                setDifficulty3D('easy');
            } else {
                setDifficulty('easy');
            }
        }

        function setDifficulty3D(level) {
            document.querySelectorAll('#difficulty-3d button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-3d-${level}`).classList.add('active');
            
            switch(level) {
                case 'easy':
                    rows = 5; cols = 5; layers = 5; mineCount = 15;
                    break;
                case 'medium':
                    rows = 7; cols = 7; layers = 7; mineCount = 40;
                    break;
                case 'hard':
                    rows = 9; cols = 9; layers = 9; mineCount = 80;
                    break;
            }
            currentLayer = 0;
            resetGame3D();
        }

        function initBoard3D() {
            board3D = Array(layers).fill().map(() => 
                Array(rows).fill().map(() => Array(cols).fill(0))
            );
            revealed3D = Array(layers).fill().map(() => 
                Array(rows).fill().map(() => Array(cols).fill(false))
            );
            flagged3D = Array(layers).fill().map(() => 
                Array(rows).fill().map(() => Array(cols).fill(false))
            );
        }

        function placeMines3D(excludeLayer, excludeRow, excludeCol) {
            let placed = 0;
            while (placed < mineCount) {
                const l = Math.floor(Math.random() * layers);
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * cols);
                
                // 不在第一次点击的位置及周围放置地雷
                if (Math.abs(l - excludeLayer) <= 1 && 
                    Math.abs(r - excludeRow) <= 1 && 
                    Math.abs(c - excludeCol) <= 1) continue;
                if (board3D[l][r][c] === -1) continue;
                
                board3D[l][r][c] = -1;
                placed++;
            }
            
            // 计算数字（3D 中有 26 个邻居）
            for (let l = 0; l < layers; l++) {
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (board3D[l][r][c] === -1) continue;
                        let count = 0;
                        for (let dl = -1; dl <= 1; dl++) {
                            for (let dr = -1; dr <= 1; dr++) {
                                for (let dc = -1; dc <= 1; dc++) {
                                    if (dl === 0 && dr === 0 && dc === 0) continue;
                                    const nl = l + dl;
                                    const nr = r + dr;
                                    const nc = c + dc;
                                    if (nl >= 0 && nl < layers && 
                                        nr >= 0 && nr < rows && 
                                        nc >= 0 && nc < cols && 
                                        board3D[nl][nr][nc] === -1) {
                                        count++;
                                    }
                                }
                            }
                        }
                        board3D[l][r][c] = count;
                    }
                }
            }
        }

        function renderBoard3D() {
            const boardEl = document.getElementById('board');
            boardEl.style.gridTemplateColumns = `repeat(${cols}, 35px)`;
            boardEl.innerHTML = '';

            // 添加层控制
            const layerControls = document.createElement('div');
            layerControls.className = 'layer-controls';
            layerControls.innerHTML = `
                <button onclick="changeLayer(-1)">⬆️ 上一层</button>
                <div class="layer-info">第 ${currentLayer + 1} 层 / 共 ${layers} 层</div>
                <button onclick="changeLayer(1)">⬇️ 下一层</button>
            `;
            boardEl.appendChild(layerControls);

            // 添加网格容器
            const gridContainer = document.createElement('div');
            gridContainer.style.display = 'grid';
            gridContainer.style.gridTemplateColumns = `repeat(${cols}, 35px)`;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell cell-3d';
                    cell.dataset.layer = currentLayer;
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    cell.addEventListener('click', () => handleClick3D(currentLayer, r, c));
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleRightClick3D(currentLayer, r, c);
                    });
                    
                    gridContainer.appendChild(cell);
                }
            }
            boardEl.appendChild(gridContainer);
            updateDisplay3D();
        }

        function changeLayer(delta) {
            const newLayer = currentLayer + delta;
            if (newLayer >= 0 && newLayer < layers) {
                currentLayer = newLayer;
                renderBoard3D();
            }
        }

        function handleClick3D(l, r, c) {
            if (gameOver || gameWon || flagged3D[l][r][c] || revealed3D[l][r][c]) return;

            if (firstClick) {
                firstClick = false;
                placeMines3D(l, r, c);
                startTimer();
            }

            if (board3D[l][r][c] === -1) {
                // 踩到地雷
                gameOver = true;
                revealed3D[l][r][c] = true;
                revealAllMines3D();
                document.getElementById('reset-btn').textContent = ANIMALS.dead;
                stopTimer();
                updateDisplay3D();
                showGameOver(false);
                return;
            }

            reveal3D(l, r, c);
            checkWin3D();
            updateDisplay3D();
        }

        function handleRightClick3D(l, r, c) {
            if (gameOver || gameWon || revealed3D[l][r][c]) return;
            
            flagged3D[l][r][c] = !flagged3D[l][r][c];
            updateMineCounter3D();
            updateDisplay3D();
            checkWin3D();
        }

        function reveal3D(l, r, c) {
            if (l < 0 || l >= layers || r < 0 || r >= rows || c < 0 || c >= cols) return;
            if (revealed3D[l][r][c] || flagged3D[l][r][c]) return;
            
            revealed3D[l][r][c] = true;
            
            if (board3D[l][r][c] === 0) {
                // 揭开周围 26 个邻居
                for (let dl = -1; dl <= 1; dl++) {
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            reveal3D(l + dl, r + dr, c + dc);
                        }
                    }
                }
            }
        }

        function revealAllMines3D() {
            for (let l = 0; l < layers; l++) {
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (board3D[l][r][c] === -1) {
                            revealed3D[l][r][c] = true;
                        }
                    }
                }
            }
        }

        function checkWin3D() {
            let unrevealedSafe = 0;
            for (let l = 0; l < layers; l++) {
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (!revealed3D[l][r][c] && board3D[l][r][c] !== -1) {
                            unrevealedSafe++;
                        }
                    }
                }
            }
            
            if (unrevealedSafe === 0) {
                gameWon = true;
                gameOver = true;
                document.getElementById('reset-btn').textContent = ANIMALS.cool;
                stopTimer();
                showGameOver(true);
            }
        }

        function updateDisplay3D() {
            const cells = document.querySelectorAll('.cell-3d');
            cells.forEach(cell => {
                const l = parseInt(cell.dataset.layer);
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                
                cell.className = 'cell cell-3d';
                cell.innerHTML = '';
                
                if (revealed3D[l][r][c]) {
                    cell.classList.add('revealed');
                    if (board3D[l][r][c] === -1) {
                        cell.textContent = ANIMALS.mine;
                        if (gameOver && !gameWon) {
                            cell.classList.add('mine-exploded');
                        }
                    } else if (board3D[l][r][c] > 0) {
                        const span = document.createElement('span');
                        span.className = `num-${Math.min(board3D[l][r][c], 8)}`;
                        span.textContent = board3D[l][r][c];
                        cell.appendChild(span);
                    }
                } else if (flagged3D[l][r][c]) {
                    cell.classList.add('flagged');
                    cell.textContent = ANIMALS.flag;
                }
            });
        }

        function updateMineCounter3D() {
            let flagCount = 0;
            for (let l = 0; l < layers; l++) {
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (flagged3D[l][r][c]) flagCount++;
                    }
                }
            }
            const remaining = mineCount - flagCount;
            document.getElementById('mine-counter').textContent = String(Math.max(0, remaining)).padStart(3, '0');
        }

        function resetGame3D() {
            stopTimer();
            timer = 0;
            document.getElementById('timer').textContent = '000';
            gameOver = false;
            gameWon = false;
            firstClick = true;
            document.getElementById('reset-btn').textContent = ANIMALS.happy;
            document.getElementById('game-over-overlay').style.display = 'none';
            
            initBoard3D();
            updateMineCounter3D();
            renderBoard3D();
        }

        // 修改 resetGame 函数以支持 3D 模式
        const originalResetGame = resetGame;
        resetGame = function() {
            if (gameMode === '3d') {
                resetGame3D();
            } else {
                originalResetGame();
            }
        };
    </script>
</body>
</html>
