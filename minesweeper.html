<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦁 动物扫雷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-container {
            background: #c0c0c0;
            border: 4px solid #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #c0c0c0;
            border: 3px inset #808080;
            padding: 8px 12px;
            margin-bottom: 10px;
        }

        .counter {
            background: #000;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            font-size: 28px;
            font-weight: bold;
            padding: 4px 8px;
            min-width: 60px;
            text-align: center;
            border: 2px inset #808080;
        }

        .reset-btn {
            font-size: 32px;
            background: #c0c0c0;
            border: 3px outset #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            cursor: pointer;
            padding: 4px 8px;
            user-select: none;
        }

        .reset-btn:active {
            border: 3px inset #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        .board {
            display: grid;
            gap: 0;
            border: 3px inset #808080;
        }

        .cell {
            width: 35px;
            height: 35px;
            background: #c0c0c0;
            border: 3px outset #fff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
        }

        .cell:active:not(.revealed):not(.flagged) {
            border: 1px solid #808080;
        }

        .cell.revealed {
            border: 1px solid #808080;
            background: #d0d0d0;
            cursor: default;
        }

        .cell.flagged {
            cursor: pointer;
        }

        .cell.mine-exploded {
            background: #ff0000;
        }

        .cell .num-1 { color: #0000ff; }
        .cell .num-2 { color: #008000; }
        .cell .num-3 { color: #ff0000; }
        .cell .num-4 { color: #000080; }
        .cell .num-5 { color: #800000; }
        .cell .num-6 { color: #008080; }
        .cell .num-7 { color: #000000; }
        .cell .num-8 { color: #808080; }

        .instructions {
            margin-top: 20px;
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .instructions p {
            margin: 5px 0;
        }

        .difficulty {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .difficulty button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border: 2px outset #fff;
            background: #c0c0c0;
            border-right-color: #808080;
            border-bottom-color: #808080;
        }

        .difficulty button:active,
        .difficulty button.active {
            border: 2px inset #808080;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over-modal {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        .game-over-modal h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .game-over-modal button {
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
        }

        .game-over-modal button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <h1>🦁 动物扫雷 🐾</h1>
    
    <div class="difficulty">
        <button onclick="setDifficulty('easy')" id="btn-easy" class="active">简单 (9×9)</button>
        <button onclick="setDifficulty('medium')" id="btn-medium">中等 (16×16)</button>
        <button onclick="setDifficulty('hard')" id="btn-hard">困难 (16×30)</button>
    </div>

    <div class="game-container">
        <div class="header">
            <div class="counter" id="mine-counter">010</div>
            <button class="reset-btn" id="reset-btn" onclick="resetGame()">😺</button>
            <div class="counter" id="timer">000</div>
        </div>
        <div class="board" id="board"></div>
    </div>

    <div class="instructions">
        <p>🖱️ 左键点击揭开格子 | 右键点击标记旗帜 🚩</p>
        <p>🦁 = 地雷 | 🐶 = 旗帜 | 找出所有安全格子获胜！</p>
    </div>

    <div class="game-over-overlay" id="game-over-overlay" style="display: none;">
        <div class="game-over-modal">
            <h2 id="game-over-title">游戏结束</h2>
            <p id="game-over-message"></p>
            <button onclick="resetGame(); document.getElementById('game-over-overlay').style.display='none';">再来一局 🎮</button>
        </div>
    </div>

    <script>
        const ANIMALS = {
            mine: '🦁',
            flag: '🐶',
            happy: '😺',
            scared: '🙀',
            dead: '😿',
            cool: '😎',
            numbers: ['', '1️⃣', '2️⃣', '3️⃣', '4️⃣', '5️⃣', '6️⃣', '7️⃣', '8️⃣']
        };

        let board = [];
        let revealed = [];
        let flagged = [];
        let rows = 9;
        let cols = 9;
        let mineCount = 10;
        let gameOver = false;
        let gameWon = false;
        let firstClick = true;
        let timer = 0;
        let timerInterval = null;

        function setDifficulty(level) {
            document.querySelectorAll('.difficulty button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${level}`).classList.add('active');
            
            switch(level) {
                case 'easy':
                    rows = 9; cols = 9; mineCount = 10;
                    break;
                case 'medium':
                    rows = 16; cols = 16; mineCount = 40;
                    break;
                case 'hard':
                    rows = 16; cols = 30; mineCount = 99;
                    break;
            }
            resetGame();
        }

        function initBoard() {
            board = Array(rows).fill().map(() => Array(cols).fill(0));
            revealed = Array(rows).fill().map(() => Array(cols).fill(false));
            flagged = Array(rows).fill().map(() => Array(cols).fill(false));
        }

        function placeMines(excludeRow, excludeCol) {
            let placed = 0;
            while (placed < mineCount) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * cols);
                
                // 不在第一次点击的位置及周围放置地雷
                if (Math.abs(r - excludeRow) <= 1 && Math.abs(c - excludeCol) <= 1) continue;
                if (board[r][c] === -1) continue;
                
                board[r][c] = -1;
                placed++;
            }
            
            // 计算数字
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c] === -1) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            const nr = r + dr;
                            const nc = c + dc;
                            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) {
                                count++;
                            }
                        }
                    }
                    board[r][c] = count;
                }
            }
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.style.gridTemplateColumns = `repeat(${cols}, 35px)`;
            boardEl.innerHTML = '';

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    cell.addEventListener('click', () => handleClick(r, c));
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleRightClick(r, c);
                    });
                    
                    boardEl.appendChild(cell);
                }
            }
            updateDisplay();
        }

        function handleClick(r, c) {
            if (gameOver || gameWon || flagged[r][c] || revealed[r][c]) return;

            if (firstClick) {
                firstClick = false;
                placeMines(r, c);
                startTimer();
            }

            if (board[r][c] === -1) {
                // 踩到地雷
                gameOver = true;
                revealed[r][c] = true; // 标记触雷位置为已揭开
                revealAllMines();
                document.getElementById('reset-btn').textContent = ANIMALS.dead;
                stopTimer();
                updateDisplay(); // 更新界面显示所有地雷
                showGameOver(false);
                return;
            }

            reveal(r, c);
            checkWin();
            updateDisplay();
        }

        function handleRightClick(r, c) {
            if (gameOver || gameWon || revealed[r][c]) return;
            
            flagged[r][c] = !flagged[r][c];
            updateMineCounter();
            updateDisplay();
            checkWin();
        }

        function reveal(r, c) {
            if (r < 0 || r >= rows || c < 0 || c >= cols) return;
            if (revealed[r][c] || flagged[r][c]) return;
            
            revealed[r][c] = true;
            
            if (board[r][c] === 0) {
                // 揭开周围
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        reveal(r + dr, c + dc);
                    }
                }
            }
        }

        function revealAllMines() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c] === -1) {
                        revealed[r][c] = true;
                    }
                }
            }
        }

        function checkWin() {
            let unrevealedSafe = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!revealed[r][c] && board[r][c] !== -1) {
                        unrevealedSafe++;
                    }
                }
            }
            
            if (unrevealedSafe === 0) {
                gameWon = true;
                gameOver = true;
                document.getElementById('reset-btn').textContent = ANIMALS.cool;
                stopTimer();
                showGameOver(true);
            }
        }

        function updateDisplay() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                
                cell.className = 'cell';
                cell.innerHTML = '';
                
                if (revealed[r][c]) {
                    cell.classList.add('revealed');
                    if (board[r][c] === -1) {
                        cell.textContent = ANIMALS.mine;
                        if (gameOver && !gameWon) {
                            cell.classList.add('mine-exploded');
                        }
                    } else if (board[r][c] > 0) {
                        const span = document.createElement('span');
                        span.className = `num-${board[r][c]}`;
                        span.textContent = board[r][c];
                        cell.appendChild(span);
                    }
                } else if (flagged[r][c]) {
                    cell.classList.add('flagged');
                    cell.textContent = ANIMALS.flag;
                }
            });
        }

        function updateMineCounter() {
            const flagCount = flagged.flat().filter(f => f).length;
            const remaining = mineCount - flagCount;
            document.getElementById('mine-counter').textContent = String(Math.max(0, remaining)).padStart(3, '0');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('timer').textContent = String(Math.min(999, timer)).padStart(3, '0');
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function showGameOver(won) {
            // 延迟 2 秒显示弹窗，让玩家有时间看一眼战局
            setTimeout(() => {
                const overlay = document.getElementById('game-over-overlay');
                const title = document.getElementById('game-over-title');
                const message = document.getElementById('game-over-message');
                
                if (won) {
                    title.textContent = '🎉 恭喜获胜！';
                    message.textContent = `你用了 ${timer} 秒找出了所有地雷！`;
                } else {
                    title.textContent = '💥 游戏结束';
                    message.textContent = '很遗憾，你踩到地雷了！';
                }
                
                overlay.style.display = 'flex';
            }, 2000);
        }

        function resetGame() {
            stopTimer();
            timer = 0;
            document.getElementById('timer').textContent = '000';
            gameOver = false;
            gameWon = false;
            firstClick = true;
            document.getElementById('reset-btn').textContent = ANIMALS.happy;
            document.getElementById('game-over-overlay').style.display = 'none';
            
            initBoard();
            updateMineCounter();
            renderBoard();
        }

        // 初始化游戏
        resetGame();
    </script>
</body>
</html>
